<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰國機票搜尋</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #764ba2;
    }

    .route-info {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 25px;
      text-align: center;
    }

    .route-info .arrow {
      color: #764ba2;
      font-size: 1.2rem;
      margin: 0 10px;
    }

    .route-info .airport {
      font-weight: 600;
      color: #333;
    }

    .route-info .city {
      color: #666;
      font-size: 0.9rem;
    }

    /* Calendar Styles */
    .calendar-container {
      margin-bottom: 25px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 15px;
    }

    .calendar-nav-btn {
      background: #f0f0f0;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .calendar-nav-btn:hover {
      background: #e0e0e0;
    }

    .calendar-nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: 600;
      color: #666;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      padding: 8px 4px;
      position: relative;
    }

    .calendar-day:hover:not(.past):not(.disabled) {
      background: #f0e6ff;
    }

    .calendar-day.past {
      background: #f5f5f5;
      color: #ccc;
      cursor: not-allowed;
    }

    .calendar-day.selected {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .calendar-day .day-number {
      font-size: 1rem;
      font-weight: 600;
    }

    .calendar-day .day-price {
      font-size: 0.7rem;
      color: #764ba2;
      font-weight: 500;
      margin-top: 2px;
    }

    .calendar-day.selected .day-price {
      color: rgba(255, 255, 255, 0.9);
    }

    .calendar-day.past .day-price {
      color: #ccc;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Result */
    .result {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 15px;
      padding: 25px;
      color: white;
      text-align: center;
      display: none;
      margin-top: 25px;
    }

    .result.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result .name {
      font-size: 1.2rem;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .result .dates {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .result .price {
      font-size: 2rem;
      font-weight: 800;
    }

    .result .price-label {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 5px;
    }

    .disclaimer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇹🇭 泰國機票搜尋</h1>

    <div class="form-group">
      <label for="name">請輸入您的名字</label>
      <input type="text" id="name" placeholder="例如：小明" autocomplete="off">
    </div>

    <div class="route-info">
      <span class="airport">TPE</span>
      <span class="city">桃園機場</span>
      <span class="arrow">✈️</span>
      <span class="airport">BKK</span>
      <span class="city">曼谷素旺那普機場</span>
    </div>

    <div class="calendar-container">
      <div class="calendar-header">
        <button class="calendar-nav-btn" id="prevMonth">◀</button>
        <span id="calendarHeader"></span>
        <button class="calendar-nav-btn" id="nextMonth">▶</button>
      </div>
      <div class="calendar-weekdays">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>
      <div class="calendar-days" id="calendarDays"></div>
    </div>

    <button class="submit-btn" id="submitBtn" disabled>送出選擇日期</button>

    <div class="result" id="result">
      <div class="name" id="resultName"></div>
      <div class="dates" id="resultDates"></div>
      <div class="price" id="resultPrice"></div>
      <div class="price-label">5 天區間內最低來回票價</div>
    </div>

    <p class="disclaimer">※ 票價為模擬資料，實際價格以 API 查詢為準</p>
  </div>

  <script>
    // Mock 機票價格資料
    const mockPrices = generateMockPrices();

    function generateMockPrices() {
      const prices = {};
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      // 產生未來 180 天的假資料
      for (let i = 0; i < 180; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() + i);
        const dateStr = formatDate(date);
        
        // 票價範圍 6,000 - 15,000 TWD，隨機生成
        prices[dateStr] = Math.floor(Math.random() * (15000 - 6000 + 1)) + 6000;
      }
      return prices;
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatDateTW(date) {
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
      const weekDay = weekDays[date.getDay()];
      return `${month}/${day}(${weekDay})`;
    }

    // 取得 5 天區間內的最低票價
    function getLowestPrice(startDate) {
      let lowestPrice = Infinity;
      
      for (let i = 0; i < 5; i++) {
        const date = new Date(startDate);
        date.setDate(date.getDate() + i);
        const dateStr = formatDate(date);
        
        if (mockPrices[dateStr] && mockPrices[dateStr] < lowestPrice) {
          lowestPrice = mockPrices[dateStr];
        }
      }
      
      return lowestPrice === Infinity ? null : lowestPrice;
    }

    let selectedDate = null;
    let currentYear, currentMonth;

    function renderCalendar() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                         '七月', '八月', '九月', '十月', '十一月', '十二月'];
      
      document.getElementById('calendarHeader').textContent = `${currentYear}年 ${monthNames[currentMonth]}`;
      
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      
      const calendarDays = document.getElementById('calendarDays');
      calendarDays.innerHTML = '';
      
      // 空白填充
      for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement('div');
        calendarDays.appendChild(emptyCell);
      }
      
      // 日期
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(currentYear, currentMonth, day);
        date.setHours(0, 0, 0, 0);
        const dateStr = formatDate(date);
        const isPast = date < today;
        const price = isPast ? null : mockPrices[dateStr];
        
        const dayCell = document.createElement('div');
        dayCell.className = 'calendar-day' + (isPast ? ' past' : '');
        dayCell.dataset.date = dateStr;
        
        dayCell.innerHTML = `
          <span class="day-number">${day}</span>
          ${price ? `<span class="day-price">NT$ ${(price / 1000).toFixed(1)}k</span>` : ''}
        `;
        
        if (!isPast) {
          dayCell.addEventListener('click', () => selectDate(dateStr, dayCell));
        }
        
        calendarDays.appendChild(dayCell);
      }
      
      // 更新導航按鈕狀態
      document.getElementById('prevMonth').disabled = (currentYear === today.getFullYear() && currentMonth === today.getMonth());
      document.getElementById('nextMonth').disabled = (currentYear > today.getFullYear() + 1 || (currentYear === today.getFullYear() + 1 && currentMonth >= today.getMonth()));
    }

    function selectDate(dateStr, element) {
      // 移除之前的选择
      document.querySelectorAll('.calendar-day.selected').forEach(el => {
        el.classList.remove('selected');
      });
      
      // 添加新选择
      element.classList.add('selected');
      selectedDate = dateStr;
      
      // 启用提交按钮
      document.getElementById('submitBtn').disabled = false;
    }

    async function showResult() {
      const name = document.getElementById('name').value.trim();
      if (!name) {
        alert('請輸入您的名字');
        document.getElementById('name').focus();
        return;
      }

      if (!selectedDate) {
        alert('請選擇出發日期');
        return;
      }

      const startDate = new Date(selectedDate);
      const endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + 4);

      // 先顯示 mock data 作為 loading
      const lowestPrice = getLowestPrice(startDate);
      
      document.getElementById('resultName').textContent = `${name} 的行程`;
      document.getElementById('resultDates').textContent = 
        `${formatDateTW(startDate)} - ${formatDateTW(endDate)}`;
      document.getElementById('resultPrice').textContent = `載入中...`;
      document.getElementById('result').classList.add('show');

      // 嘗試從 API 獲取真實票價
      try {
        const departureDate = formatDate(startDate);
        const returnDate = formatDate(endDate);
        
        const apiUrl = `/api/flights?departure_id=TPE&arrival_id=BKK&outbound_date=${departureDate}&return_date=${returnDate}`;
        const response = await fetch(apiUrl);
        const data = await response.json();
        
        let apiPrice = null;
        
        // 嘗試從 best_flights 獲取最低價
        if (data.best_flights && data.best_flights.length > 0) {
          for (const flight of data.best_flights) {
            // price 可能是數字或字串
            const price = typeof flight.price === 'number' ? flight.price : parseInt(flight.price);
            if (!apiPrice || price < apiPrice) {
              apiPrice = price;
            }
          }
        }
        
        // 嘗試從 other_flights 獲取更低價
        if (data.other_flights && data.other_flights.length > 0) {
          for (const flight of data.other_flights) {
            const price = typeof flight.price === 'number' ? flight.price : parseInt(flight.price);
            if (!apiPrice || price < apiPrice) {
              apiPrice = price;
            }
          }
        }
        
        // 如果 API 有返回票價，使用它
        if (apiPrice) {
          document.getElementById('resultPrice').textContent = 
            `NT$ ${apiPrice.toLocaleString()}`;
          document.querySelector('.disclaimer').textContent = '※ 即時票價資料來源：Google Flights (SerpApi)';
        } else {
          // API 沒有返回結果，使用 mock data
          document.getElementById('resultPrice').textContent = 
            lowestPrice ? `NT$ ${lowestPrice.toLocaleString()}` : '查無資料';
          document.querySelector('.disclaimer').textContent = '※ 票價為模擬資料';
        }
      } catch (error) {
        console.error('API Error:', error);
        // API 失敗，使用 mock data
        document.getElementById('resultPrice').textContent = 
          lowestPrice ? `NT$ ${lowestPrice.toLocaleString()}` : '查無資料';
        document.querySelector('.disclaimer').textContent = '※ 票價為模擬資料';
      }
    }

    // 初始化
    const today = new Date();
    currentYear = today.getFullYear();
    currentMonth = today.getMonth();
    renderCalendar();

    // 月份導航
    document.getElementById('prevMonth').addEventListener('click', () => {
      if (currentMonth === 0) {
        currentMonth = 11;
        currentYear--;
      } else {
        currentMonth--;
      }
      selectedDate = null;
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('result').classList.remove('show');
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      if (currentMonth === 11) {
        currentMonth = 0;
        currentYear++;
      } else {
        currentMonth++;
      }
      selectedDate = null;
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('result').classList.remove('show');
      renderCalendar();
    });

    // 提交按钮事件
    document.getElementById('submitBtn').addEventListener('click', showResult);

    // 名字输入后也可以触发更新（如果有选中的日期）
    document.getElementById('name').addEventListener('input', function() {
      if (selectedDate && document.getElementById('result').classList.contains('show')) {
        showResult();
      }
    });
  </script>
</body>
</html>
